<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>한강런</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available}
body{
  min-height:100vh;min-height:100dvh;background:#0b0b0b;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;touch-action:none;overscroll-behavior:none;
  -webkit-overflow-scrolling:none;user-select:none;-webkit-user-select:none;
}
#wrap{display:flex;flex-direction:column;width:100%;max-width:560px;height:100vh;height:100dvh;margin:0 auto}
canvas{flex:1 1 auto;min-height:0;width:100%;display:block;background:#0b0b0b;
  image-rendering:pixelated;image-rendering:crisp-edges}
#ctrl{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;
  padding:12px 12px;padding-bottom:max(16px,env(safe-area-inset-bottom));
  background:#1a1a1a;border-top:2px solid #2a2a2a;
}
.btn{
  background:#252525;border:2px solid #3a3a3a;border-radius:8px;
  color:#ddd;font:bold 15px/1.35 'Courier New',monospace;
  min-height:68px;padding:10px 4px;cursor:pointer;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;transition:background 50ms,border-color 50ms,transform 50ms;
}
.btn small{color:#777;font-size:11px}
.btn:active,.btn.on{background:#3d3d3d;border-color:#888;transform:scale(0.95)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="300" height="540"></canvas>
  <div id="ctrl">
    <button class="btn" id="bJ">⬆️ 점프<br><small>물·게토레이 먹기</small><br><small>Space / ↑</small></button>
    <button class="btn" id="bC">⬇️ 웅크리기<br><small>초파리 피하기</small><br><small>↓ / S</small></button>
  </div>
</div>
<script>
'use strict';
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
cx.imageSmoothingEnabled=false;

let W=300,H=540;       // canvas size — set to fill the viewport in resize()
const BK=16;
const SB_H=156;        // scoreboard height
let GY=H-32;           // flat ground top — recomputed on resize
let top0=80,rh=150;    // character-select row layout — recomputed on resize
const PLX=64;          // player fixed x
const CH_H=31;         // standing char height (top->feet)

// Tuning -------------------------------------------------------------------
const BASE_V=3.2, VCAP=9.5, JUMP_V=-9.5, JUMP_G=0.6;
const BOOST_FRAMES=240, BOOST_ADD=3, WATER_BONUS=40;

// Palette ------------------------------------------------------------------
const K={
  skyDT:'#5BA3C8',skyDB:'#A8D8F0', skyET:'#C26820',skyEB:'#E8A050',
  skyNT:'#0D1B2A',skyNB:'#1A3A5C',
  g1:'#5D9E2F',g2:'#4A7A25',g3:'#8B6040',g4:'#7A5030',
  sun:'#FFD700',sunG:'#FFF176', cl:'#FFFFFF',clS:'#DDEEFF', sk:'#FFCC99',
};
function lerpC(a,b,t){
  const p=x=>parseInt(x,16),h=x=>x.replace('#','');
  const A=h(a),B=h(b);
  const r1=p(A.slice(0,2)),g1=p(A.slice(2,4)),b1=p(A.slice(4,6));
  const r2=p(B.slice(0,2)),g2=p(B.slice(2,4)),b2=p(B.slice(4,6));
  return `rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
}
function px(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(~~x,~~y,~~w,~~h)}

// Characters (cosmetic only) -----------------------------------------------
const params=new URLSearchParams(location.search);
const NAMES=[
  params.get('n1')||'이번달 1등',
  params.get('n2')||'이번달 2등',
  params.get('n3')||'이번달 3등',
];
const CHARS=[
  {medal:'🥇',hair:'pony',hairC:'#3A2A18',top:'#39FF8F',topD:'#1FBF6A',pants:'#2B3A55',glow:'#39FF8F',band:'#FFFFFF'},
  {medal:'🥈',hair:'bob', hairC:'#181820',top:'#FF2D78',topD:'#C01F58',pants:'#222831',glow:'#FF2D78',band:null},
  {medal:'🥉',hair:'buns',hairC:'#5C3D1E',top:'#FFD54A',topD:'#C8A020',pants:'#2B3A55',glow:'#FFD54A',band:null},
];

// State --------------------------------------------------------------------
let phase='select',charIdx=0;
let dist=0,best=+localStorage.getItem('hgbest')||0,newBest=false;
let tick=0,gtick=0,scrollX=0,v=BASE_V,boost=0,spawnAccum=0,spawnGap=180;
const pl={y:GY-CH_H,vy:0,grnd:true,crouch:false,legF:0,legT:0};
let events=[];const got={water:0,gat:0};
const clouds=[{x:60,y:184,w:58},{x:190,y:210,w:72},{x:20,y:244,w:48}];

// Input --------------------------------------------------------------------
function tapJump(){if(phase!=='play')return;if(pl.grnd){pl.crouch=false;pl.vy=JUMP_V;pl.grnd=false;}}
function setCrouch(b){if(phase!=='play')return;if(b){if(pl.grnd)pl.crouch=true;}else pl.crouch=false;}
function startGame(idx){
  charIdx=idx;phase='play';dist=0;tick=0;scrollX=0;v=BASE_V;boost=0;newBest=false;
  events=[];got.water=0;got.gat=0;spawnAccum=0;spawnGap=180;
  Object.assign(pl,{y:GY-CH_H,vy:0,grnd:true,crouch:false,legF:0,legT:0});
}
function spawnEvent(){
  const r=Math.random();
  if(r<0.5)        events.push({t:'fly',  wx:scrollX+W+16,y:GY-52,w:40,h:26});
  else if(r<0.75)  events.push({t:'water',wx:scrollX+W+16,y:GY-76,w:24,h:24});
  else             events.push({t:'gat',  wx:scrollX+W+16,y:GY-76,w:24,h:24});
}

// Update -------------------------------------------------------------------
function update(){
  gtick++;
  for(const c of clouds){c.x-=0.3;if(c.x+c.w<0)c.x=W+c.w+10;}
  if(phase!=='play')return;
  tick++;
  v=BASE_V+Math.min(3.0,dist*0.0006);
  if(boost>0){v+=BOOST_ADD;boost--;}
  v=Math.min(VCAP,v);
  scrollX+=v;dist+=v*0.4;

  if(!pl.grnd)pl.crouch=false;
  if(pl.grnd&&!pl.crouch){const rate=Math.max(3,~~(16-v*1.2));if(++pl.legT>=rate){pl.legT=0;pl.legF=(pl.legF+1)%4;}}
  if(!pl.grnd){pl.y+=pl.vy;pl.vy+=JUMP_G;if(pl.y>=GY-CH_H){pl.y=GY-CH_H;pl.vy=0;pl.grnd=true;}}
  else pl.y=GY-CH_H;

  spawnAccum+=v;
  if(spawnAccum>=spawnGap){spawnAccum=0;spawnEvent();spawnGap=Math.max(120,210-dist*0.008)+~~(Math.random()*70);}

  // player hitbox
  const hx=PLX-2,hw=16;
  let htop,hbot;
  if(!pl.grnd){htop=pl.y;hbot=pl.y+CH_H;}
  else if(pl.crouch){htop=GY-18;hbot=GY;}
  else{htop=pl.y;hbot=GY;}

  for(let i=events.length-1;i>=0;i--){
    const e=events[i],ex=e.wx-scrollX;
    const hit=hx<ex+e.w&&hx+hw>ex&&htop<e.y+e.h&&hbot>e.y;
    if(e.t==='fly'){
      if(hit){newBest=dist>best;if(newBest){best=~~dist;localStorage.setItem('hgbest',best);}phase='dead';return;}
    }else if(hit){
      if(e.t==='gat'){boost=BOOST_FRAMES;got.gat++;}else got.water++;
      dist+=WATER_BONUS;events.splice(i,1);
    }
  }
  events=events.filter(e=>e.wx>scrollX-50);
}

// Scenery ------------------------------------------------------------------
function skyPhase(){return phase==='play'?(tick/3000)%1:0;}
function drawSky(){
  const t=skyPhase();let top,bot;
  if(t<0.35){top=K.skyDT;bot=K.skyDB;}
  else if(t<0.5){const f=(t-0.35)/0.15;top=lerpC(K.skyDT,K.skyET,f);bot=lerpC(K.skyDB,K.skyEB,f);}
  else if(t<0.65){const f=(t-0.5)/0.15;top=lerpC(K.skyET,K.skyNT,f);bot=lerpC(K.skyEB,K.skyNB,f);}
  else{top=K.skyNT;bot=K.skyNB;}
  const g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,top);g.addColorStop(1,bot);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
}
function drawStars(){
  const t=skyPhase();if(t<0.5)return;
  const a=Math.min(1,(t-0.5)/0.15)*0.85,band=GY-40-SB_H;
  cx.fillStyle=`rgba(255,255,255,${a})`;
  for(let i=0;i<40;i++)cx.fillRect((i*97+13)%W,SB_H+((i*113+7)%band),(i%4===0)?2:1,(i%4===0)?2:1);
}
function drawSun(){
  const t=skyPhase();if(t>0.72)return;
  const a=t<0.55?1:Math.max(0,1-(t-0.55)/0.17);
  const sx=(W*0.72-(scrollX*0.04)%W+W)%W,sy=186+Math.sin(t*Math.PI*0.85)*14;
  cx.globalAlpha=a;
  cx.fillStyle=K.sunG;cx.beginPath();cx.arc(sx,sy,18,0,7);cx.fill();
  cx.fillStyle=K.sun; cx.beginPath();cx.arc(sx,sy,12,0,7);cx.fill();
  cx.globalAlpha=1;
}
function drawClouds(){
  const t=skyPhase(),a=t>0.62?Math.max(0.08,1-(t-0.62)/0.15):1;
  cx.globalAlpha=a;
  for(const c of clouds){const x=c.x,y=c.y,w=c.w;
    px(x+~~(w*.2),y+5,~~(w*.6),8,K.clS);px(x,y+8,w,10,K.clS);
    px(x+~~(w*.1),y,~~(w*.8),13,K.cl);px(x+~~(w*.3),y-5,~~(w*.4),9,K.cl);}
  cx.globalAlpha=1;
}
function drawGround(){
  const ox=-(scrollX%BK);
  for(let sx=ox-BK;sx<W+BK;sx+=BK){
    px(sx,GY,BK,4,K.g1);px(sx,GY+4,BK,4,K.g2);
    for(let y=GY+8;y<H;y+=BK)px(sx,y,BK,BK,((y/BK)&1)?K.g4:K.g3);
    cx.fillStyle='rgba(0,0,0,0.18)';cx.fillRect(~~sx,GY,1,H-GY);
  }
}

// Runner -------------------------------------------------------------------
const LA=[[0,0,0,0],[3,-3,-3,3],[0,0,0,0],[-3,3,3,-3]];
function drawRunner(bx,by,frame,ch,grnd){
  const la=LA[frame],sk=K.sk,pants=ch.pants,pantsD='#1A2436',top=ch.top,topD=ch.topD;
  px(bx+1,by+19+la[0],6,9,pants);px(bx+1,by+19+la[0],6,2,pantsD);
  px(bx,  by+27+la[0],7,4,'#3E2010');px(bx,by+27+la[0],7,1,'#251208');
  px(bx+8,by+19+la[1],6,9,pants);px(bx+8,by+19+la[1],6,2,pantsD);
  px(bx+7,by+27+la[1],7,4,'#3E2010');px(bx+7,by+27+la[1],7,1,'#251208');
  px(bx+1,by+10,12,9,top);px(bx+1,by+10,12,2,topD);
  px(bx-2,by+11+la[2],4,7,top);px(bx-2,by+11+la[2],4,2,topD);px(bx-2,by+17+la[2],4,3,sk);
  px(bx+12,by+11+la[3],4,7,top);px(bx+12,by+11+la[3],4,2,topD);px(bx+12,by+17+la[3],4,3,sk);
  px(bx+2,by,11,10,sk);
  if(ch.hair==='pony'){
    px(bx+2,by,11,3,ch.hairC);px(bx+1,by+2,3,6,ch.hairC);
    const s=(frame===1||frame===3)?1:0;px(bx-4,by+1+s,3,4,ch.hairC);px(bx-6,by+3+s,3,4,ch.hairC);
  }else if(ch.hair==='bob'){
    px(bx+1,by,12,4,ch.hairC);px(bx+1,by+2,3,9,ch.hairC);px(bx+10,by+2,3,9,ch.hairC);
  }else{px(bx+2,by,11,3,ch.hairC);px(bx,by-3,5,5,ch.hairC);px(bx+9,by-3,5,5,ch.hairC);}
  if(ch.band)px(bx+2,by+2,11,2,ch.band);
  if(grnd){px(bx+3,by+4,3,3,'#fff');px(bx+8,by+4,3,3,'#fff');px(bx+4,by+5,2,2,'#222');px(bx+9,by+5,2,2,'#222');}
  else{px(bx+3,by+5,3,1,'#222');px(bx+8,by+5,3,1,'#222');}
  px(bx+5,by+8,3,1,'#A05030');
}
function drawCrouch(bx,ch){
  const sk=K.sk,pants=ch.pants,top=ch.top,topD=ch.topD,Y=GY;
  px(bx-1,Y-3,8,3,'#3E2010');px(bx+8,Y-3,8,3,'#3E2010');     // shoes
  px(bx+1,Y-8,6,5,pants);px(bx+8,Y-8,6,5,pants);             // bent legs
  px(bx,Y-18,15,11,top);px(bx,Y-18,15,2,topD);               // crouched body
  px(bx+13,Y-14,4,4,sk);                                     // arm forward
  px(bx+2,Y-26,12,8,sk);                                     // tucked head
  px(bx+2,Y-26,12,3,ch.hairC);if(ch.band)px(bx+2,Y-24,12,2,ch.band);
  px(bx+8,Y-23,3,3,'#fff');px(bx+9,Y-22,2,2,'#222');
}
function drawEvent(e){
  const x=e.wx-scrollX;
  if(e.t==='fly'){
    cx.fillStyle='rgba(40,30,10,0.22)';cx.beginPath();cx.arc(x+20,e.y+14,19,0,7);cx.fill();
    cx.font='18px serif';cx.textAlign='center';
    const j=(gtick%6<3)?0:1;
    cx.fillText('🪰',x+10,e.y+16+j);cx.fillText('🪰',x+26,e.y+11-j);
    cx.fillText('🪰',x+17,e.y+25+j);cx.fillText('🪰',x+33,e.y+20-j);
    cx.textAlign='left';
  }else{
    cx.font='28px serif';cx.textAlign='center';
    cx.fillText(e.t==='gat'?'🥤':'💧',x+12,e.y+22);
    cx.textAlign='left';
  }
}

// Scoreboard ---------------------------------------------------------------
function drawScoreboard(){
  px(0,0,W,SB_H,'#0A0E14');
  cx.strokeStyle='#1f3a2e';cx.lineWidth=2;cx.strokeRect(3,3,W-6,SB_H-8);
  for(let i=10;i<W-8;i+=26){const on=(Math.floor(Date.now()/280)+i)%2===0;px(i,8,4,4,on?'#FFE680':'#4a4a32');}
  cx.textAlign='center';
  cx.fillStyle='#FF2D78';cx.font='bold 12px monospace';cx.fillText('🏟 한강 스타디움',W/2,30);
  const ds=(dist/10).toFixed(0);
  cx.font='bold 42px monospace';const dw=cx.measureText(ds).width;
  cx.textAlign='left';
  cx.fillStyle='#39FF8F';cx.fillText(ds,W/2-dw/2,76);
  cx.font='bold 15px monospace';cx.fillStyle='#9fe9c5';cx.fillText('m',W/2+dw/2+5,76);
  // speed label + boost
  cx.font='10px monospace';cx.fillStyle='#999';cx.fillText('속도',30,90);
  if(boost>0&&Math.floor(Date.now()/150)%2===0){cx.textAlign='right';cx.fillStyle='#FFD54A';cx.font='bold 11px monospace';cx.fillText('⚡ BOOST!',W-30,90);cx.textAlign='left';}
  const bx=30,by=94,bw=W-60;
  px(bx,by,bw,12,'#1a1f28');
  const r=v/VCAP;cx.fillStyle=boost>0?'#FFD54A':(r>0.7?'#FF8844':'#44DD44');
  px(bx,by,bw*r,12,cx.fillStyle);
  cx.strokeStyle='#333';cx.lineWidth=1;cx.strokeRect(bx,by,bw,12);
  // character
  cx.textAlign='center';cx.font='bold 14px monospace';cx.fillStyle=CHARS[charIdx].glow;
  let nm=NAMES[charIdx];if(nm.length>10)nm=nm.slice(0,10)+'…';
  cx.fillText(CHARS[charIdx].medal+' '+nm,W/2,124);
  // best + drink tally
  cx.font='11px monospace';cx.textAlign='left';cx.fillStyle='#FFD700';
  cx.fillText('🏆 '+(best/10).toFixed(0)+'m',20,144);
  cx.textAlign='right';cx.fillStyle='#cfe';cx.fillText('💧'+got.water+'  🥤'+got.gat,W-20,144);
  cx.textAlign='left';
}
function blink(){return Math.floor(Date.now()/550)%2===0;}

function drawSelect(){
  drawSky();drawClouds();drawGround();
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#FFD700';cx.font='bold 24px monospace';cx.fillText('캐릭터 선택',W/2,46);
  cx.fillStyle='#bbb';cx.font='11px monospace';cx.fillText('점프=음료🥤  웅크리기=초파리🪰',W/2,66);
  const frame=Math.floor(gtick/8)%4;
  for(let i=0;i<3;i++){
    const ch=CHARS[i],ry=top0+i*rh,cyr=ry+rh/2;
    cx.fillStyle='rgba(255,255,255,0.04)';cx.fillRect(16,ry+10,W-32,rh-22);
    cx.strokeStyle=ch.glow;cx.lineWidth=2;cx.strokeRect(16,ry+10,W-32,rh-22);
    cx.globalAlpha=0.16;cx.fillStyle=ch.glow;cx.beginPath();cx.arc(70,cyr+2,30,0,7);cx.fill();cx.globalAlpha=1;
    drawRunner(63,cyr-16,frame,ch,true);
    cx.textAlign='left';
    cx.font='22px serif';cx.fillText(ch.medal,140,cyr-12);
    cx.font='bold 14px monospace';cx.fillStyle=ch.glow;
    let nm=NAMES[i];if(nm.length>9)nm=nm.slice(0,9)+'…';
    cx.fillText(nm,140,cyr+12);
    cx.font='10px monospace';cx.fillStyle='#999';cx.fillText('이번달 '+(i+1)+'등',140,cyr+30);
    cx.textAlign='center';
  }
  if(blink()){cx.fillStyle='#88FF88';cx.font='bold 13px monospace';cx.fillText('[ 캐릭터를 탭하세요 ]',W/2,H-16);}
  cx.textAlign='left';
}
function overlay(title,lines,hint){
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#FFD700';cx.font='bold 30px monospace';cx.fillText(title,W/2,H/2-46);
  cx.fillStyle='#ddd';cx.font='14px monospace';
  lines.forEach((l,i)=>cx.fillText(l,W/2,H/2+2+i*24));
  if(blink()){cx.fillStyle='#88FF88';cx.font='bold 13px monospace';cx.fillText(hint,W/2,H/2+62);}
  cx.fillStyle='#aaa';cx.font='11px monospace';cx.fillText('아래쪽 탭 → 캐릭터 변경',W/2,H-16);
  cx.textAlign='left';
}

// Loop ---------------------------------------------------------------------
function loop(){
  update();
  cx.clearRect(0,0,W,H);
  if(phase==='select'){drawSelect();requestAnimationFrame(loop);return;}
  drawSky();drawStars();drawSun();drawClouds();drawGround();
  events.forEach(drawEvent);
  if(pl.crouch&&pl.grnd)drawCrouch(PLX,CHARS[charIdx]);
  else drawRunner(PLX,~~pl.y,pl.legF,CHARS[charIdx],pl.grnd);
  drawScoreboard();
  if(phase==='dead')overlay('GAME OVER',
    [`달린 거리  ${(dist/10).toFixed(1)}m`,
     `💧${got.water}  🥤${got.gat}`,
     newBest?'🏆 신기록!':`최고 ${(best/10).toFixed(1)}m`],
    '[ 탭하여 다시하기 ]');
  requestAnimationFrame(loop);
}

// Bindings -----------------------------------------------------------------
document.addEventListener('contextmenu',e=>e.preventDefault());
const vib=ms=>navigator.vibrate&&navigator.vibrate(ms);
function bindTap(id,fn){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();el.classList.add('on');fn();vib(18);});
  el.addEventListener('pointerup',()=>el.classList.remove('on'));
  el.addEventListener('pointerout',()=>el.classList.remove('on'));
}
function bindHold(id,on,off){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();el.classList.add('on');on();vib(12);});
  el.addEventListener('pointerup',e=>{e.preventDefault();el.classList.remove('on');off();});
  el.addEventListener('pointerout',()=>{el.classList.remove('on');off();});
  el.addEventListener('pointercancel',()=>{el.classList.remove('on');off();});
}
bindTap('bJ',tapJump);
bindHold('bC',()=>setCrouch(true),()=>setCrouch(false));

function canvasXY(e){const r=cv.getBoundingClientRect();return [(e.clientX-r.left)/r.width*W,(e.clientY-r.top)/r.height*H];}
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();const [x,y]=canvasXY(e);
  if(phase==='select'){const slot=Math.max(0,Math.min(2,Math.floor((y-top0)/rh)));startGame(slot);}
  else if(phase==='dead'){if(y>H*0.82)phase='select';else startGame(charIdx);}
});
document.addEventListener('keydown',e=>{
  switch(e.code){
    case'Space':case'ArrowUp':case'KeyW':e.preventDefault();if(phase==='dead')startGame(charIdx);else tapJump();break;
    case'ArrowDown':case'KeyS':e.preventDefault();setCrouch(true);break;
    case'Digit1':if(phase!=='play')startGame(0);break;
    case'Digit2':if(phase!=='play')startGame(1);break;
    case'Digit3':if(phase!=='play')startGame(2);break;
  }
});
document.addEventListener('keyup',e=>{if(e.code==='ArrowDown'||e.code==='KeyS')setCrouch(false);});

// Fit to the *visible* viewport (handles Safari toolbar, Galaxy, foldables) --
// World height stays fixed at 540 so sprite/object scale is identical on every
// device; only the world width follows the screen's aspect ratio. CSS then
// stretches the canvas to fill its box (same aspect → no distortion).
const wrap=document.getElementById('wrap');
function resize(){
  const r=cv.getBoundingClientRect();
  const cw=Math.max(200,r.width),chh=Math.max(300,r.height);
  H=540;                                   // fixed virtual height
  W=Math.max(240,Math.min(900,Math.round(H*cw/chh)));
  cv.width=W;cv.height=H;
  cx.imageSmoothingEnabled=false;          // reset by canvas resize
  GY=H-32;top0=80;rh=(H-top0-20)/3;
  pl.y=GY-CH_H;
}
function fit(){
  const vv=window.visualViewport;
  wrap.style.height=(vv?vv.height:window.innerHeight)+'px';
  resize();
}
window.addEventListener('resize',fit);
window.addEventListener('orientationchange',fit);
if(window.visualViewport){
  visualViewport.addEventListener('resize',fit);
  visualViewport.addEventListener('scroll',fit);
}

fit();
loop();
</script>
