<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>🏃‍♀️ 한강런 클럽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: only light; }

  :root {
    --primary: #2563EB;
    --primary-light: #EFF6FF;
    --bg: #F8F9FA;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* HEADER */
  .header {
    background: var(--card);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .load-more-btn {
    display: block; width: calc(100% - 8px); margin: 12px 4px 4px; padding: 12px;
    border: 1px solid var(--border); background: var(--card); border-radius: 12px;
    font-size: 14px; font-weight: 600; color: var(--primary); cursor: pointer; transition: all .2s;
  }
  .load-more-btn:active { background: var(--bg); }

  /* CALENDAR */
  .calendar-wrap { padding: 16px 20px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav button { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; }
  .cal-nav h2 { font-size: 16px; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-label { text-align: center; font-size: 11px; color: var(--text-secondary); padding: 4px 0; font-weight: 600; }
  .cal-day-label:first-child { color: #EF4444; }
  .cal-day-label:last-child { color: var(--primary); }
  .cal-cell {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: 10px; cursor: pointer; position: relative;
    font-size: 13px; transition: background .15s;
  }
  .cal-cell:hover { background: var(--primary-light); }
  .cal-cell.today { background: var(--primary-light); font-weight: 700; color: var(--primary); }
  .cal-cell.other-month { color: #D1D5DB; }
  .cal-cell.sunday { color: #EF4444; }
  .cal-cell.saturday { color: var(--primary); }
  .cal-cell.today.sunday, .cal-cell.today.saturday { color: var(--primary); }
  .run-dots { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; }
  .run-dot { width: 5px; height: 5px; border-radius: 50%; }
  .run-dot.upcoming { background: var(--primary); }
  .run-dot.past { background: #D1D5DB; }
  .run-dot.completed { background: #10B981; }
  .badge-completed { background: #D1FAE5; color: #065F46; }

  /* LIST VIEW */
  .list-wrap { padding: 0 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); padding: 16px 4px 8px; text-transform: uppercase; letter-spacing: .5px; }

  /* RUN CARD */
  .run-card {
    background: var(--card); border-radius: var(--radius); padding: 16px;
    margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer;
    transition: transform .15s, box-shadow .15s; border: 1px solid transparent;
  }
  .run-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  .run-card.upcoming { border-color: #DBEAFE; }
  .run-card.past { opacity: 0.65; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 16px; font-weight: 700; line-height: 1.3; flex: 1; }
  .card-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-distance { background: var(--primary-light); color: var(--primary); }
  .badge-green { background: #D1FAE5; color: #065F46; }
  .badge-yellow { background: #FEF3C7; color: #92400E; }
  .badge-red { background: #FEE2E2; color: #991B1B; }
  .badge-purple { background: #F3E8FF; color: #7E22CE; }
  .card-meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .meta-item { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-secondary); }
  .card-creator { margin-top: 6px; font-size: 11px; color: var(--text-secondary); }
  .card-desc {
    margin-top: 10px; padding: 10px 12px; background: var(--primary-light);
    border-left: 3px solid var(--primary); border-radius: 8px;
    font-size: 13px; line-height: 1.45; color: var(--text); white-space: pre-wrap;
  }
  .detail-desc {
    padding: 14px 16px; background: var(--primary-light);
    border-left: 3px solid var(--primary); border-radius: 12px;
    font-size: 15px; line-height: 1.5; color: var(--text); white-space: pre-wrap;
  }
  .card-participants { margin-top: 10px; }
  .participant-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .participant-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
    padding: 3px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px;
  }
  .chip-remove { background: none; border: none; cursor: pointer; color: #9CA3AF; font-size: 14px; padding: 0; line-height: 1; }
  .chip-remove:hover { color: #EF4444; }
  .card-photos { margin-top: 10px; display: flex; gap: 8px; }
  .photo-thumb {
    width: 80px; height: 80px; border-radius: 10px; object-fit: cover;
    cursor: pointer; border: 1px solid var(--border);
  }

  /* FAB */
  .fab {
    position: fixed; right: 20px; bottom: 24px; z-index: 200;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--primary); color: white; border: none;
    font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(37,99,235,0.45);
    display: flex; align-items: center; justify-content: center; transition: transform .15s;
  }
  .fab:hover { transform: scale(1.08); }

  /* NICKNAME MODAL */
  .nickname-modal-box {
    background: var(--card); width: 100%; border-radius: 24px 24px 0 0;
    padding: 0 20px 40px;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.25,.8,.25,1);
  }
  .modal-overlay.open .nickname-modal-box { transform: translateY(0); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300;
    display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); width: 100%; border-radius: 24px 24px 0 0;
    max-height: 92vh; overflow-y: auto; padding: 0 20px 40px;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.25,.8,.25,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: #E5E7EB; border-radius: 2px; margin: 12px auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-section { margin-bottom: 20px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 11px 14px; font-size: 15px; outline: none; transition: border-color .2s;
    font-family: inherit; background: var(--card);
  }
  .form-input:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-primary {
    width: 100%; background: var(--primary); color: white; border: none;
    border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger {
    width: 100%; background: #FEE2E2; color: #DC2626; border: none; border-radius: 12px;
    padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }

  /* PARTICIPANT INPUT */
  .participant-input-row { display: flex; gap: 8px; }
  .participant-input-row .form-input { flex: 1; }
  .btn-add {
    background: var(--primary-light); color: var(--primary); border: none;
    border-radius: 10px; padding: 0 16px; font-size: 20px; cursor: pointer; font-weight: 700;
  }

  /* PHOTO UPLOAD */
  .photo-upload-area {
    border: 2px dashed var(--border); border-radius: 12px; padding: 20px;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
  }
  .photo-upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
  .photo-upload-area input { display: none; }
  .photo-preview-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .photo-preview-item { position: relative; }
  .photo-preview-item img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
  .photo-remove {
    position: absolute; top: -6px; right: -6px; background: #EF4444; color: white;
    border: 2px solid white; border-radius: 50%; width: 22px; height: 22px;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-weight: 700; line-height: 1;
  }

  /* DETAIL MODAL */
  .detail-modal .detail-hero {
    background: linear-gradient(135deg, #1D4ED8 0%, #3B82F6 100%);
    margin: 0 -20px; padding: 20px 20px 24px; color: white;
  }
  .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .detail-section { margin-top: 20px; }
  .detail-section-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .detail-info-grid { display: grid; gap: 10px; }
  .detail-info-item { display: flex; align-items: center; gap: 10px; }
  .detail-info-icon { font-size: 18px; width: 32px; text-align: center; }
  .detail-info-text { font-size: 14px; }
  .detail-info-text a { color: var(--primary); text-decoration: none; }
  .weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .weather-card { background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; }
  .weather-icon { font-size: 20px; }
  .weather-value { font-size: 14px; font-weight: 700; margin-top: 2px; }
  .weather-label { font-size: 10px; color: var(--text-secondary); }
  .dust-index { text-align: center; padding: 12px; background: var(--bg); border-radius: 12px; margin-top: 10px; }
  .dust-index-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .dust-index-badge { font-size: 15px; font-weight: 700; }
  .photo-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 95%; max-height: 90vh; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 16px; right: 16px; color: white; background: rgba(0,0,0,0.5);
    border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1A1A1A; color: white; padding: 10px 20px; border-radius: 20px;
    font-size: 14px; z-index: 600; opacity: 0; transition: all .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .spinner {
    display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* ANALYTICS */
  .analytics-btn {
    background: none; border: none; cursor: pointer;
    color: #9CA3AF; padding: 4px 5px; border-radius: 6px; font-size: 17px;
    display: flex; align-items: center; transition: transform .15s, filter .2s; line-height: 1;
    filter: grayscale(0.15);
  }
  .analytics-btn:hover, .analytics-btn:active { transform: scale(1.12); filter: none; }
  .analytics-tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .analytics-tab {
    flex: 1; padding: 9px; border: 1.5px solid var(--border); border-radius: 10px;
    background: none; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--text-secondary); transition: all .2s; font-family: inherit;
  }
  .analytics-tab.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-num { font-size: 32px; font-weight: 800; color: var(--primary); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .leaderboard { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .lb-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg); border-radius: 12px; padding: 12px 14px;
  }
  .lb-rank { font-size: 16px; width: 26px; text-align: center; }
  .lb-name { flex: 1; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .lb-dist { font-size: 15px; font-weight: 700; text-align: right; }
  .lb-count { font-size: 11px; color: var(--text-secondary); text-align: right; }
  .badge-legend { background: #FEF3C7; color: #92400E; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }

  /* TRAINING PRESCRIPTION */
  .zone-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--bg); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
  }
  .zone-name { font-size: 13px; font-weight: 700; }
  .zone-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .zone-value { font-size: 14px; font-weight: 700; color: var(--primary); text-align: right; white-space: nowrap; }
  .training-note {
    font-size: 12px; line-height: 1.6; color: var(--text-secondary);
    background: var(--primary-light); border-radius: 12px; padding: 12px 14px; margin-top: 8px;
  }
  .training-disclaimer {
    font-size: 11px; line-height: 1.6; color: var(--text-secondary);
    border-top: 1px solid var(--border); padding-top: 12px; margin-top: 20px;
  }
  .training-persuade {
    font-size: 12px; line-height: 1.7; color: var(--text);
    background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 12px;
    padding: 12px 14px; margin: 8px 0 16px;
  }
  .training-persuade b { color: #92400E; }

  /* NEON TICKER */
  .neon-ticker {
    background: #0a0a0a;
    overflow: hidden;
    padding: 7px 0;
    white-space: nowrap;
    position: relative;
    /* 모바일(iOS Safari)에서 애니메이션 레이어가 떨어져 글자가 사라지는 현상 방지 */
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
  }
  .neon-ticker::before, .neon-ticker::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; width: 32px; z-index: 2;
    pointer-events: none;
  }
  .neon-ticker::before { left: 0; background: linear-gradient(to right, #0a0a0a, transparent); }
  .neon-ticker::after  { right: 0; background: linear-gradient(to left, #0a0a0a, transparent); }
  .neon-track {
    display: inline-flex;
    gap: 0;
    animation: neon-scroll 38s linear infinite;
    /* GPU 합성 레이어로 고정해 모바일에서 렌더링이 떨어지지 않게 */
    will-change: transform;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }
  .neon-track:hover { animation-play-state: paused; }
  @keyframes neon-scroll {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); }
  }
  .neon-phrase {
    display: inline-block;
    font-size: 13px;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: #39FF8F;
    text-shadow: 0 0 8px #39FF8F, 0 0 18px #39FF8F, 0 0 32px #1aff70;
    padding: 0 24px;
    font-family: 'Archivo Black', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }
  .neon-sep {
    display: inline-block;
    color: #FF2D78;
    text-shadow: 0 0 8px #FF2D78, 0 0 18px #FF2D78;
    font-size: 13px;
    font-style: italic;
    font-family: 'Archivo Black', sans-serif;
    padding: 0 6px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div style="display:flex; align-items:center; gap:6px;">
      <h1>🏃‍♀️ 한강런 클럽</h1>
      <button class="analytics-btn" onclick="openAnalytics()" title="애널리틱스" aria-label="애널리틱스">📊</button>
      <button class="analytics-btn" onclick="openTraining()" title="훈련 처방" aria-label="훈련 처방">⏱️</button>
    </div>
  </div>
</div>

<!-- NEON TICKER -->
<div class="neon-ticker" id="neon-ticker">
  <div class="neon-track" id="neon-track"></div>
</div>

<!-- MAIN CONTENT -->
<div id="view-calendar">
  <div class="calendar-wrap">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <h2 id="cal-month-label"></h2>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="list-wrap" id="cal-runs-list"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="새 런 추가">＋</button>

<!-- NICKNAME MODAL -->
<div class="modal-overlay" id="nickname-modal-overlay" onclick="handleOverlayClick(event, 'nickname-modal-overlay')">
  <div class="modal" id="nickname-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">내 닉네임이 뭐예요? 👋</div>
    <p style="font-size:14px; color:var(--text-secondary); margin-bottom:20px;">모임을 연 사람으로 표시돼요. 한 번만 입력하면 기억해드려요.</p>
    <div class="modal-section">
      <label class="form-label">닉네임</label>
      <input type="text" class="form-input" id="f-nickname" placeholder="예: 붕어빵, 달리기왕, 민수" maxlength="12">
    </div>
    <button class="btn-primary" onclick="confirmNickname()">확인</button>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="add-modal-overlay" onclick="handleOverlayClick(event, 'add-modal-overlay')">
  <div class="modal" id="add-modal">
    <div class="modal-handle"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div class="modal-title" id="modal-title-text" style="margin-bottom:0">새 런 추가</div>
      <div id="creator-badge-display" style="font-size:12px; color:var(--text-secondary);"></div>
    </div>

    <div class="modal-section">
      <label class="form-label">런 제목 / 별칭 *</label>
      <input type="text" class="form-input" id="f-title" placeholder="예: 어린이대공원 붕어빵런" maxlength="100">
    </div>
    <div class="modal-section form-row">
      <div>
        <label class="form-label">날짜 *</label>
        <input type="date" class="form-input" id="f-date">
      </div>
      <div>
        <label class="form-label">시간 *</label>
        <input type="time" class="form-input" id="f-time">
      </div>
    </div>
    <div class="modal-section">
      <label class="form-label">장소</label>
      <input type="text" class="form-input" id="f-location" placeholder="예: 어린이대공원 정문 앞">
    </div>

// ─── COMPLETED CHECK ─────────────────────────────────────────────
function isCompleted(run) {
  const today = new Date().toISOString().slice(0,10);
  // 사진 2장을 모두 올려야 완료 처리 (1장만으로는 미완료)
  return run.date <= today && run.photos && run.photos.length >= 2;
}

// ─── NEON TICKER ─────────────────────────────────────────────────
// 실데이터 기반의 실용 문장 + 항상 보여줄 evergreen 문장을 섞는다.
let _tickerLast = '';

function tickerPhrases() {
  const todayStr = new Date().toISOString().slice(0,10);
  const monthStr = todayStr.slice(0,7);
  const upcoming = (runs || [])
    .filter(r => r.date > todayStr || (r.date === todayStr && !isCompleted(r)))
    .sort((a,b) => a.date.localeCompare(b.date));

  const dynamic = [];

  // 1) 이번 주(월~일) 예정된 런 수 — 오늘 ~ 이번 주 일요일까지
  const todayDate = new Date(todayStr);
  const daysToSunday = (7 - todayDate.getUTCDay()) % 7; // 일요일(0)이면 오늘이 주의 끝
  const weekEnd = new Date(todayDate);
  weekEnd.setUTCDate(todayDate.getUTCDate() + daysToSunday);
  const weekEndStr = weekEnd.toISOString().slice(0,10);
  const thisWeek = upcoming.filter(r => r.date <= weekEndStr).length;
  if (thisWeek > 0) dynamic.push(`You have ${thisWeek} run${thisWeek > 1 ? 's' : ''} this week`);

  // 2) 다음 런까지 카운트다운 (today / tomorrow / in N days)
  if (upcoming.length) {
    const next = upcoming[0];
    const diff = Math.round((new Date(next.date) - new Date(todayStr)) / 86400000);
    const when = diff <= 0 ? 'is today' : diff === 1 ? 'is tomorrow' : `in ${diff} days`;
    dynamic.push(`Next run ${when} · ${next.title}`);
  }

  // 3) 이번 달 완료한 런 수
  const completedMonth = (runs || []).filter(r => isCompleted(r) && r.date.startsWith(monthStr));
  if (completedMonth.length > 0) dynamic.push(`${completedMonth.length} run${completedMonth.length > 1 ? 's' : ''} done this month`);

  // 4) 이번 달 리더보드 1~3위 샤라웃 (광인 레이스)
  const top3 = buildLeaderboard(completedMonth).slice(0, 3);
  if (top3.length > 0) dynamic.push(`RACE FOR GWANG-IN -> ${top3.map(t => t.name).join(' · ')}`);

  // evergreen — 데이터가 없어도 전광판이 비지 않도록 항상 채워준다.
  const evergreen = [
    'Lace up — the Hangang is waiting',
    'Snap a photo after your run',
    'Invite a friend to your next run',
    'Plan a run — tap the +',
  ];

  const phrases = [...dynamic, ...evergreen];
  return phrases.length >= 4 ? phrases : [...phrases, ...evergreen];
}

function renderTicker() {
  const track = document.getElementById('neon-track');
  if (!track) return;
  const phrases = tickerPhrases();
  const key = phrases.join('|');
  if (key === _tickerLast) return; // 내용이 같으면 애니메이션을 다시 시작하지 않는다.
  _tickerLast = key;

  const full = [...phrases, ...phrases]; // 끊김 없는 루프를 위해 복제
  track.innerHTML = '';
  full.forEach((p, i) => {
    const span = document.createElement('span');
    span.className = 'neon-phrase';
    span.textContent = p;
    track.appendChild(span);
    if (i < full.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'neon-sep';
      sep.textContent = '✦';
      track.appendChild(sep);
    }
  });
}

// ─── CALENDAR ────────────────────────────────────────────────────
function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const label = new Date(calYear, calMonth, 1).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long' });
  document.getElementById('cal-month-label').textContent = label;

  const grid = document.getElementById('cal-grid');
  const days = ['일','월','화','수','목','금','토'];
  grid.innerHTML = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();
  const runMap = {};
  runs.forEach(r => { (runMap[r.date] = runMap[r.date] || []).push(r); });

  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    grid.innerHTML += `<div class="cal-cell other-month">${prevLast - i}</div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const dow = new Date(calYear, calMonth, d).getDay();
    const cls = ['cal-cell', isToday ? 'today' : '', dow === 0 ? 'sunday' : dow === 6 ? 'saturday' : ''].filter(Boolean).join(' ');
    const dayRuns = runMap[dateStr] || [];
    const dots = dayRuns.map(r => {
      const isPast = r.date < today.toISOString().slice(0,10);
      const comp = isCompleted(r);
      const cls = comp ? 'completed' : isPast ? 'past' : 'upcoming';
      return `<div class="run-dot ${cls}" title="${comp ? '완료' : ''}"></div>`;
    }).join('');
    grid.innerHTML += `<div class="${cls}" onclick="filterCalendarByDate('${dateStr}')">${d}<div class="run-dots">${dots}</div></div>`;
  }

  const totalCells = firstDay + lastDate;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    grid.innerHTML += `<div class="cal-cell other-month">${i}</div>`;
  }

  renderCalRunsList();
}

// 달력 하단 목록: 예정된 런(가까운 순) → 지난 런(최신 순, 3개씩 더 보기)
function renderCalRunsList() {
  const today = new Date().toISOString().slice(0,10);
  const sortKey = r => `${r.date}T${r.time || '99:99'}`; // 날짜+시간 순, 시간 없으면 뒤로
  const upcoming = runs.filter(r => r.date > today || (r.date === today && !isCompleted(r))).sort((a,b) => sortKey(a).localeCompare(sortKey(b)));
  const done = runs.filter(r => r.date === today && isCompleted(r));
  const past = [...done, ...runs.filter(r => r.date < today)].sort((a,b) => sortKey(b).localeCompare(sortKey(a)));

  const el = document.getElementById('cal-runs-list');
  el.innerHTML = '';

  if (upcoming.length === 0 && past.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏃‍♀️</div><div class="empty-text">아직 러닝 일정이 없어요<br>+ 버튼으로 추가해보세요!</div></div>`;
    return;
  }

  if (upcoming.length > 0) {
    el.insertAdjacentHTML('beforeend', `<div class="section-title">예정된 런</div>`);
    upcoming.forEach(r => el.appendChild(buildRunCard(r)));
  }

  if (past.length > 0) {
    el.insertAdjacentHTML('beforeend', `<div class="section-title">지난 런</div>`);
    past.slice(0, pastRunsLimit).forEach(r => el.appendChild(buildRunCard(r)));
    if (past.length > pastRunsLimit) {
      const btn = document.createElement('button');
      btn.className = 'load-more-btn';
      btn.textContent = `지난 런 더 보기 (${past.length - pastRunsLimit})`;
      btn.onclick = () => { pastRunsLimit += 3; renderCalRunsList(); };
      el.appendChild(btn);
    }
  }
}

function filterCalendarByDate(dateStr) {
  const dateRuns = runs.filter(r => r.date === dateStr);
  if (dateRuns.length === 0) return;
  if (dateRuns.length === 1) { openDetail(dateRuns[0]); return; }
  renderRunsInto('cal-runs-list', dateRuns);
}

// ─── LIST VIEW ───────────────────────────────────────────────────
function renderRunsInto(containerId, runsArr, emptyMsg) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  if (runsArr.length === 0 && emptyMsg) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">${emptyMsg}</div></div>`;
    return;
  }
  runsArr.forEach(r => el.appendChild(buildRunCard(r)));
}

function buildRunCard(run) {
  const today = new Date().toISOString().slice(0,10);
  const completed = isCompleted(run);
  const isPast = run.date < today || completed;
  const card = document.createElement('div');
  card.className = `run-card ${isPast ? 'past' : 'upcoming'}`;
  card.onclick = () => openDetail(run);

  const completedBadge = completed ? `<span class="badge badge-completed">✅ 완료</span>` : '';
  const distanceBadge = run.distance ? `<span class="badge badge-distance">📏 ${run.distance}km</span>` : '';

  let participantsHtml = '';
  if (run.participants && run.participants.length > 0) {
    const chips = run.participants.map(p => `<span class="chip">${esc(p)}</span>`).join('');
    participantsHtml = `<div class="card-participants"><div class="participant-label">👭 참여자 ${run.participants.length}명</div><div class="participant-chips">${chips}</div></div>`;
  }

  let photosHtml = '';
  if (run.photos && run.photos.length > 0) {
    const thumbs = run.photos.map(url => `<img class="photo-thumb" src="${url}" onclick="event.stopPropagation(); openLightbox('${url}')">`).join('');
    photosHtml = `<div class="card-photos">${thumbs}</div>`;
  }

  const creatorHtml = run.createdBy ? `<div class="card-creator">👑 ${esc(run.createdBy)} 개설</div>` : '';
  const descHtml = run.description ? `<div class="card-desc">${esc(run.description)}</div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">${esc(run.title || '제목 없음')}</div>
      <div class="card-badges">${completedBadge}${distanceBadge}</div>
    </div>
    <div class="card-meta">
      ${run.date ? `<span class="meta-item">📅 ${formatDate(run.date)}</span>` : ''}
      ${run.time ? `<span class="meta-item">🕐 ${run.time}</span>` : ''}
      ${run.location ? `<span class="meta-item">📍 ${esc(run.location)}</span>` : ''}
    </div>
    ${descHtml}
    ${creatorHtml}
    ${participantsHtml}
    ${photosHtml}`;

  return card;
}

    </div>

  openModal('detail-modal-overlay');

  const body = document.getElementById('detail-body');

  // Description (optional) — 눈에 잘 띄게 상단에 표시
  if (run.description) {

  }

  // Info section
  let infoHtml = '<div class="detail-section"><div class="detail-section-title">정보</div><div class="detail-info-grid">';

  if (run.distance) infoHtml += `<div class="detail-info-item"><span class="detail-info-icon">📏</span><span class="detail-info-text">${run.distance}km</span></div>`;
  if (run.courseUrl) infoHtml += `<div class="detail-info-item"><span class="detail-info-icon">🗺️</span><span class="detail-info-text"><a href="${esc(run.courseUrl)}" target="_blank">코스 보기</a></span></div>`;
  infoHtml += '</div></div>';
  body.innerHTML += infoHtml;

  // Weather placeholder — 날씨는 비동기라, 자리만 먼저 잡아두고 나중에 채운다.
  // (날씨 로딩이 느려도 아래 참여자/사진/수정 버튼이 즉시 보이도록)
  body.innerHTML += `<div id="detail-weather-slot"></div>`;

  // Participants
  if (run.participants && run.participants.length > 0) {
    const chips = run.participants.map(p =>
      `<span class="chip">${esc(p)}<button class="chip-remove" onclick="removeParticipantFromRun('${run.id}', '${esc(p)}')">×</button></span>`
    ).join('');
    body.innerHTML += `
      <div class="detail-section">
        <div class="detail-section-title">참여자 (${run.participants.length}명)</div>
        <div class="participant-chips">${chips}</div>
      </div>`;
  }

  body.innerHTML += `
    <div class="detail-section">
      <div class="participant-input-row">
        <input type="text" class="form-input" id="detail-participant-input" placeholder="이름 추가" style="font-size:14px;">
        <button class="btn-add" onclick="addParticipantToRun('${run.id}')">＋</button>
      </div>
    </div>`;

  if (run.photos && run.photos.length > 0) {
    const imgs = run.photos.map(url => `<img class="gallery-img" src="${url}" onclick="openLightbox('${url}')">`).join('');
    body.innerHTML += `<div class="detail-section"><div class="detail-section-title">사진</div><div class="photo-gallery">${imgs}</div></div>`;
  }

  body.innerHTML += `<div style="margin-top:20px; display:flex; gap:10px;">
    <button class="btn-primary" style="flex:1" onclick="closeModal('detail-modal-overlay'); openEditModal('${run.id}')">✏️ 수정하기</button>
  </div>`;

  // 이벤트 리스너는 모든 innerHTML 조작 이후에 붙인다 (innerHTML += 가 기존 노드를 재생성하므로).
  document.getElementById('detail-participant-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addParticipantToRun(run.id); }
  });

  // Weather + Dust — 위에서 잡아둔 슬롯에 나중에 채운다. 실패해도 나머지 UI에는 영향 없음.
  const wx = await fetchWeatherAndDust(run.date, run.time);
  const slot = document.getElementById('detail-weather-slot');
  if (wx && slot) {
    const di = dustIndex(wx.pm25);
    const wc = weatherCondition(wx.weatherCode);
    const timeLabel = run.time ? ` (${run.time} 기준)` : '';
    slot.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">날씨 & 대기환경${timeLabel}</div>
        <div class="weather-grid">
          <div class="weather-card"><div class="weather-icon">${wc.icon}</div><div class="weather-value" style="font-size:12px">${wc.label}</div><div class="weather-label">날씨</div></div>
          <div class="weather-card"><div class="weather-icon">🌡</div><div class="weather-value">${wx.temp}°C</div><div class="weather-label">기온</div></div>
          <div class="weather-card"><div class="weather-icon">🌧</div><div class="weather-value">${wx.rain}%</div><div class="weather-label">강수확률</div></div>
          <div class="weather-card"><div class="weather-icon">☀️</div><div class="weather-value">${wx.uv}</div><div class="weather-label">UV 지수</div></div>
        </div>
        <div class="dust-index" style="margin-top:10px">
          <div class="dust-index-label">미세먼지 (PM2.5 · PM10: ${wx.pm10}㎍/㎥)</div>
          <div class="dust-index-badge">${di.icon} ${di.label} — ${di.desc}</div>
        </div>
      </div>`;
  }
}

// ─── SAVE ────────────────────────────────────────────────────────
async function saveRun() {
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  const distanceVal = parseFloat(document.getElementById('f-distance').value);
  if (!title || !date) { showToast('제목과 날짜는 필수예요!'); return; }
  if (!distanceVal || distanceVal <= 0) { showToast('거리를 입력해주세요!'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 저장 중...';

  try {
    const uploadedUrls = [];
    const runId = editingRunId || db.collection('runs').doc().id;

    for (const photo of formPhotos) {
      const ref = storage.ref(`photos/${runId}/${Date.now()}_${Math.random().toString(36).slice(2)}.webp`);
      await ref.put(photo.blob, { contentType: 'image/webp' });
      const url = await ref.getDownloadURL();
      uploadedUrls.push(url);
    }

    const allPhotos = [...existingPhotos, ...uploadedUrls];

    const data = {
      title,
      date,
      time: document.getElementById('f-time').value,
      location: document.getElementById('f-location').value.trim(),
      distance: parseFloat(document.getElementById('f-distance').value) || null,
      courseUrl: document.getElementById('f-course-url').value.trim(),
      description: document.getElementById('f-description').value.trim(),
      participants: formParticipants,
      photos: allPhotos,
    };
    Object.keys(data).forEach(k => (data[k] === null || data[k] === '') && delete data[k]);

    if (editingRunId) {
      await db.collection('runs').doc(editingRunId).update(data);
      showToast('런이 수정됐어요 ✅');
    } else {
      data.createdBy = myNickname || '';
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      if (myNickname) {
        const others = (data.participants || []).filter(p => p !== myNickname);
        data.participants = [myNickname, ...others];
      }
      await db.collection('runs').doc(runId).set(data);
      showToast('런이 추가됐어요 🏃‍♀️');
    }
    closeModal('add-modal-overlay');
  } catch (e) {
    console.error(e);
    showToast('저장에 실패했어요. 다시 시도해주세요.');
  } finally {
    btn.disabled = false;
    btn.textContent = editingRunId ? '수정 저장' : '저장하기';
  }
}

// ─── PHOTO UPLOAD ─────────────────────────────────────────────────
function handlePhotoSelect(e) {
  const files = Array.from(e.target.files);
  const remaining = 2 - existingPhotos.length - formPhotos.length;
  if (remaining <= 0) { showToast('사진은 최대 2장까지 올릴 수 있어요'); return; }
  files.slice(0, remaining).forEach(file => convertToWebp(file));
  e.target.value = '';
}

function convertToWebp(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      let { width, height } = img;
      if (width > MAX || height > MAX) {
        if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
        else { width = Math.round(width * MAX / height); height = MAX; }
      }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        const dataUrl = canvas.toDataURL('image/webp', 0.85);
        formPhotos.push({ file, dataUrl, blob });
        renderPhotoPreview();
      }, 'image/webp', 0.85);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function renderPhotoPreview() {
  const row = document.getElementById('photo-preview-row');
  row.querySelectorAll('.photo-preview-item[data-type="new"]').forEach(el => el.remove());
  formPhotos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-preview-item';
    div.dataset.type = 'new';
    div.innerHTML = `<img src="${p.dataUrl}"><button class="photo-remove" onclick="removeNewPhoto(${i})">✕</button>`;
    row.appendChild(div);
  });
}

function removeNewPhoto(i) {
  formPhotos.splice(i, 1);
  renderPhotoPreview();
}

// ─── WEATHER + DUST ──────────────────────────────────────────────
const wxCache = {};

async function fetchWeatherAndDust(dateStr, timeStr) {
  if (!dateStr) return null;
  const cacheKey = `${dateStr}_${timeStr || ''}`;
  if (wxCache[cacheKey]) return wxCache[cacheKey];

  const today = new Date();
  const target = new Date(dateStr);
  const diffDays = Math.round((target - today) / 86400000);
  if (diffDays < -1 || diffDays > 15) return null;

  const hour = timeStr ? parseInt(timeStr.split(':')[0], 10) : 7;

  try {
    const [wxRes, dustRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&hourly=temperature_2m,precipitation_probability,weathercode,uv_index&timezone=Asia/Seoul&start_date=${dateStr}&end_date=${dateStr}`),
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=37.5665&longitude=126.9780&hourly=pm10,pm2_5&timezone=Asia/Seoul&start_date=${dateStr}&end_date=${dateStr}`)
    ]);
    const wxJson = await wxRes.json();
    const dustJson = await dustRes.json();
    if (!wxJson.hourly) return null;

    const pm25Arr = (dustJson.hourly?.pm2_5 || []).slice(6, 18).filter(v => v != null);
    const pm10Arr = (dustJson.hourly?.pm10 || []).slice(6, 18).filter(v => v != null);
    const avg = arr => arr.length ? Math.round(arr.reduce((a,b) => a+b, 0) / arr.length) : null;

    const data = {
      temp: Math.round(wxJson.hourly.temperature_2m[hour] ?? 0),
      rain: wxJson.hourly.precipitation_probability[hour] ?? 0,
      uv: Math.round(wxJson.hourly.uv_index[hour] ?? 0),
      weatherCode: wxJson.hourly.weathercode[hour] ?? 0,
      pm25: avg(pm25Arr) ?? '–',
      pm10: avg(pm10Arr) ?? '–',
    };
    wxCache[cacheKey] = data;
    return data;
  } catch { return null; }
}

function weatherCondition(code) {
  if (code === 0)  return { icon: '☀️', label: '맑음' };
  if (code <= 2)   return { icon: '🌤', label: '구름 조금' };
  if (code === 3)  return { icon: '☁️', label: '흐림' };
  if (code <= 48)  return { icon: '🌫', label: '안개' };
  if (code <= 55)  return { icon: '🌦', label: '이슬비' };
  if (code <= 65)  return { icon: '🌧', label: '비' };
  if (code <= 75)  return { icon: '❄️', label: '눈' };
  if (code <= 82)  return { icon: '🌦', label: '소나기' };
  return            { icon: '⛈', label: '뇌우' };
}

function dustIndex(pm25) {
  if (pm25 === '–' || pm25 === null) return { icon: '❓', label: '정보없음', desc: '데이터를 가져올 수 없어요' };
  if (pm25 <= 15)  return { icon: '🟢', label: '좋음',     desc: '맑은 공기 — 달리기 최적!' };
  if (pm25 <= 35)  return { icon: '🟡', label: '보통',     desc: '마스크 없이 가능하지만 예민하다면 주의' };
  if (pm25 <= 75)  return { icon: '🟠', label: '나쁨',     desc: '마스크 착용 권장' };
  return              { icon: '🔴', label: '매우나쁨', desc: '야외 활동 자제 권장' };
}

function dustIndexPM10(pm10) {
  if (pm10 === '–' || pm10 === null) return { icon: '❓', label: '정보없음' };
  if (pm10 <= 30)  return { icon: '🟢', label: '좋음' };
  if (pm10 <= 80)  return { icon: '🟡', label: '보통' };
  if (pm10 <= 150) return { icon: '🟠', label: '나쁨' };
  return              { icon: '🔴', label: '매우나쁨' };
}

// ─── 훈련 처방 (TRAINING PRESCRIPTION) ──────────────────────────────
// 근거:
// - 심박존: Tanaka et al. 2001 (HRmax = 208 - 0.7×나이), 안정시심박 입력 시 Karvonen(여유심박) 방식
// - 페이스존: Daniels & Gilbert VDOT 공식 (Daniels' Running Formula)
// - 강도 분배: Seiler 80/20 폴라라이즈드, 인터벌(I)은 주간거리의 ~8% 이내, VDOT는 4~8주마다 재측정 권장
// - 총량 하한: WHO 2020 가이드라인(고강도 주 75~150분)

function openTraining() {
  document.getElementById('training-result').style.display = 'none';
  openModal('training-modal-overlay');
}

// "25:30" 또는 "1:45:00" → 초
function parseTimeToSeconds(str) {
  const parts = str.trim().split(':').map(s => Number(s));
  if (parts.some(isNaN) || parts.length < 2 || parts.length > 3) return null;
  let sec = 0;
  for (const p of parts) sec = sec * 60 + p;
  return sec > 0 ? sec : null;
}

function secToPace(secPerKm) {
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function secToHMS(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = Math.round(totalSec % 60);
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// Daniels & Gilbert 회귀식: VO2 = -4.60 + 0.182258v + 0.000104v² (v = m/min)
function vo2FromVelocity(v) {
  return -4.60 + 0.182258 * v + 0.000104 * v * v;
}
// 위 식의 역함수: VO2 → v (m/min)
function velocityFromVo2(vo2) {
  const a = 0.000104, b = 0.182258, c = -(4.60 + vo2);
  return (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
}
// %VO2max 사용 비율 (레이스 시간이 길수록 VO2max를 덜 쓴다)
function pctVo2maxFromTime(tMin) {
  return 0.8 + 0.1894393 * Math.exp(-0.012778 * tMin) + 0.2989558 * Math.exp(-0.1932605 * tMin);
}
function calcVDOT(distanceKm, timeSec) {
  const v = (distanceKm * 1000) / (timeSec / 60); // m/min
  const tMin = timeSec / 60;
  return vo2FromVelocity(v) / pctVo2maxFromTime(tMin);
}
// VDOT와 강도(%VO2max)로부터 km당 페이스(초) 계산
function paceSecPerKmAtIntensity(vdot, pct) {
  const v = velocityFromVo2(vdot * pct); // m/min
  return 1000 / v * 60;
}

function calcTraining() {
  const age = Number(document.getElementById('tr-age').value);
  const restingHr = Number(document.getElementById('tr-resting-hr').value) || null;
  const distanceKm = Number(document.getElementById('tr-race-distance').value);
  const timeSec = parseTimeToSeconds(document.getElementById('tr-race-time').value);
  const level = document.getElementById('tr-level').value;
  const weeklyKm = Number(document.getElementById('tr-weekly-km').value) || null;

  if (!age || age < 10 || age > 100) {
    showToast('나이를 정확히 입력해주세요');
    return;
  }
  if (!timeSec) {
    showToast('레이스 기록을 mm:ss 또는 h:mm:ss 형식으로 입력해주세요');
    return;
  }

  // 1. 심박존 — Tanaka 공식
  const hrMax = Math.round(208 - 0.7 * age);
  const hrZoneDefs = [
    { name: 'Zone 1 · 회복', range: [0.50, 0.60], desc: '아주 가볍게 몸을 풀어주는 정도' },
    { name: 'Zone 2 · 쉬움', range: [0.60, 0.70], desc: '옆 사람과 대화하면서 뛸 수 있는 정도 (대부분 여기서 뛰면 돼요)' },
    { name: 'Zone 3 · 약간 힘듦', range: [0.70, 0.80], desc: '말은 가능하지만 슬슬 숨이 차는 정도' },
    { name: 'Zone 4 · 힘듦',   range: [0.80, 0.90], desc: '대화하기 힘들고 숨이 많이 가쁜 정도' },
    { name: 'Zone 5 · 매우 힘듦', range: [0.90, 1.00], desc: '전력 질주에 가까운, 짧게만 버틸 수 있는 정도' },
  ];
  const hrZones = hrZoneDefs.map(z => {
    let lo, hi;
    if (restingHr) { // Karvonen (여유심박)
      lo = Math.round(restingHr + (hrMax - restingHr) * z.range[0]);
      hi = Math.round(restingHr + (hrMax - restingHr) * z.range[1]);
    } else { // %HRmax
      lo = Math.round(hrMax * z.range[0]);
      hi = Math.round(hrMax * z.range[1]);
    }
    return { ...z, lo, hi };
  });

  // 2. VDOT & 페이스존 — Daniels & Gilbert
  const vdot = calcVDOT(distanceKm, timeSec);
  const paceZoneDefs = [
    { name: '🟢 쉬운 페이스',   range: [0.59, 0.74], desc: '대화 가능한 편한 속도. 전체 러닝의 80%는 이 페이스로!' },
    { name: '🔵 마라톤 페이스', range: [0.75, 0.84], desc: '긴 거리를 끝까지 유지할 수 있는 속도' },
    { name: '🟡 약간 힘든 페이스', range: [0.83, 0.88], desc: '20~40분 정도 버티면 숨이 차오르는 속도. 주 1회 정도' },
    { name: '🟠 많이 힘든 페이스', range: [0.95, 1.00], desc: '3~5분씩 짧게 끊어 달리는 강한 훈련. 격주 1회 정도' },
    { name: '🔴 전력 질주',      range: [1.05, 1.10], desc: '200~400m를 전력으로! 스피드와 폼 연습용' },
  ];
  const paceZones = paceZoneDefs.map(z => ({
    ...z,
    fastSec: paceSecPerKmAtIntensity(vdot, z.range[1]),
    slowSec: paceSecPerKmAtIntensity(vdot, z.range[0]),
  }));

  // 3. 빈도/볼륨 — 경력 기반
  const levelPlan = {
    beginner:     { freq: '주 3회', minMin: 75,  note: '걷기와 달리기를 섞어서 시작해도 좋아요. 아직 강한 훈련(많이 힘든 페이스)은 넣지 마세요.' },
    intermediate: { freq: '주 4~5회', minMin: 100, note: '주 1번은 "약간 힘든 페이스"로, 격주로 1번은 "많이 힘든 페이스"를 넣어보세요.' },
    advanced:     { freq: '주 5~6회', minMin: 150, note: '주 1~2번은 강한 훈련을, 나머지 날은 모두 쉬운 페이스로 가볍게 채우세요.' },
  };
  const plan = levelPlan[level];

  // 4. 강도 분배 (80/20) + 인터벌 볼륨 가드레일
  let volumeNote = '';
  if (weeklyKm) {
    const easyKm = (weeklyKm * 0.8).toFixed(1);
    const qualityKm = (weeklyKm * 0.2).toFixed(1);
    const intervalCapKm = (weeklyKm * 0.08).toFixed(1);
    volumeNote = `지금 주간 ${weeklyKm}km를 기준으로 보면 → 쉬운 페이스로 약 ${easyKm}km(전체의 80%), 나머지 약 ${qualityKm}km(20%)만 강도 높은 훈련으로 채우면 좋아요. 그 중에서도 "많이 힘든 페이스"는 ${intervalCapKm}km(주간 거리의 8%) 정도까지만!`;
  } else {
    volumeNote = `한 주 동안 달리는 양의 80%는 쉬운 페이스로, 나머지 20%만 힘든 훈련으로 채우는 걸 목표로 해보세요. 그 중에서도 "많이 힘든 페이스"는 한 주 전체 거리의 8% 정도까지만 추천해요.`;
  }

  const hrZonesHtml = hrZones.map(z => `
    <div class="zone-row">
      <div>
        <div class="zone-name">${z.name}</div>
        <div class="zone-desc">${z.desc}</div>
      </div>
      <div class="zone-value">${z.lo}~${z.hi} bpm</div>
    </div>
  `).join('');

  const paceZonesHtml = paceZones.map(z => `
    <div class="zone-row">
      <div>
        <div class="zone-name">${z.name}</div>
        <div class="zone-desc">${z.desc}</div>
      </div>
      <div class="zone-value">${secToPace(z.fastSec)}~${secToPace(z.slowSec)} /km</div>
    </div>
  `).join('');

  const resultHtml = `
    <div class="detail-section-title" style="margin-top:0">📈 내 현재 체력</div>
    <div class="stat-row" style="margin-bottom:14px">
      <div class="stat-card">
        <div class="stat-num">${vdot.toFixed(1)}</div>
        <div class="stat-label">체력 점수<br>(높을수록 체력 좋음)</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${hrMax}</div>
        <div class="stat-label">최대 심박수<br>(예상치, bpm)</div>
      </div>
    </div>

    <div class="training-persuade">
      💬 <b>"이 정도로 숨차도 훨씬 더 잘 달릴 수 있는데?"</b> 싶으신가요? 맞아요, 오늘 하루는 더 빨리 뛸 수 있어요. 하지만 중요한 건 "오늘 얼마나 빠른가"가 아니라 "한 달, 두 달 뒤에 얼마나 빨라져 있는가"예요.<br><br>
      세계 최상위 마라톤 선수들도 훈련의 <b>80%는 일부러 여유로운 페이스</b>로 뛰어요. 매번 숨차게 달리면 ① 회복이 안 돼서 다음 훈련의 질이 떨어지고 ② 부상 위험이 커지고 ③ 정작 중요한 '힘든 날' 훈련을 100% 소화하지 못해요.<br><br>
      쉬운 날 제대로 쉬워야 힘든 날 더 강하게 훈련할 수 있고, 그게 쌓여야 체력 점수가 진짜로 올라가요. "느리게 뛰는 게 아니라 다음 단계를 위해 회복을 쌓는 중"이라고 생각해보세요.
    </div>

    <div class="detail-section-title">🏃 이렇게 뛰어보세요 (페이스 가이드)</div>
    ${vdot < 32 ? `
    <div class="training-note" style="margin-bottom:8px">
      🚶 계산상 "쉬운 페이스"가 빠르게 걷는 정도로 꽤 느리게 나왔을 거예요. 이상한 게 아니라, 지금 단계에서는 원래 그래요. 아직은 천천히 오래 달리는 것보다 <b>"빠르게 걷기 + 짧게 달리기"를 번갈아</b> 하는 게 더 효과적이고 부담도 적어요. 체력이 붙으면(체력 점수가 오르면) 이 페이스도 자연스럽게 빨라져요.
    </div>` : ''}
    ${paceZonesHtml}

    <div class="detail-section-title">❤️ 심박수로 강도 확인하기</div>
    ${hrZonesHtml}

    <div class="detail-section-title">📅 이번 주는 이렇게</div>
    <div class="zone-row">
      <div>
        <div class="zone-name">추천 운동 횟수</div>
        <div class="zone-desc">${plan.note}</div>
      </div>
      <div class="zone-value">${plan.freq}</div>
    </div>
    <div class="training-note">
      ${volumeNote}<br><br>
      📏 <b>뭘 보고 뛰어야 하나요?</b><br>
      • 쉬운 페이스로 가볍게 뛰는 날 → <b>심박수</b>로 확인하세요. 페이스만 보면 컨디션 안 좋은 날 너무 무리하기 쉬워요.<br>
      • 인터벌처럼 짧고 강한 날 → <b>페이스</b>로 확인하세요. 심박수는 따라 올라오는 데 시간이 걸려서 짧은 구간에선 잘 안 맞아요.<br>
      • 템포·롱런처럼 길게 유지하는 날 → 둘 다 참고해도 좋아요.<br><br>
      ⚠️ 부상 조심: 매주 거리를 조금씩 늘리는 것보다, <b>한 번 뛸 때 평소보다 갑자기 너무 길게나 너무 빠르게 뛰지 않는 것</b>이 더 중요해요. 오늘 컨디션이 좋다고 갑자기 욕심내지 마세요.<br><br>
      🚀 더 빨라지고 싶다면? 지금 알려드린 페이스대로 4~8주 꾸준히 달려보세요. 몸이 적응하면 체력 점수가 자연스럽게 올라가고, 그때 최근 기록을 다시 입력하면 더 빨라진 페이스로 업데이트해줄게요. 성장은 천천히, 꾸준히가 답이에요!
    </div>

    <div class="training-disclaimer">
      이 결과는 일반적인 운동 가이드일 뿐, 의학적인 진단이나 처방이 아니에요. 운동 중에 통증, 어지러움, 가슴 답답함 같은 증상이 있다면 바로 멈추고 전문가와 상담하세요.
    </div>
  `;

  const resultEl = document.getElementById('training-result');
  resultEl.innerHTML = resultHtml;
  resultEl.style.display = 'block';
}

// ─── ANALYTICS ───────────────────────────────────────────────────
let analyticsTab = 'all';

function openAnalytics() {
  analyticsTab = 'all';
  document.getElementById('tab-all').classList.add('active');
  document.getElementById('tab-month').classList.remove('active');
  renderAnalyticsContent();
  openModal('analytics-modal-overlay');
}

function switchAnalyticsTab(tab) {
  analyticsTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-month').classList.toggle('active', tab === 'month');
  renderAnalyticsContent();
}

function buildLeaderboard(filteredRuns) {
  const stats = {};
  filteredRuns.forEach(run => {
    (run.participants || []).forEach(p => {
      if (!stats[p]) stats[p] = { count: 0, distance: 0 };
      stats[p].count++;
      stats[p].distance += parseFloat(run.distance) || 0;
    });
  });
  return Object.entries(stats)
    .map(([name, s]) => ({ name, ...s }))
    .sort((a, b) => b.distance - a.distance || b.count - a.count);
}

function renderAnalyticsContent() {
  const today = new Date().toISOString().slice(0, 10);
  const monthStr = today.slice(0, 7);

  const completedAll = runs.filter(isCompleted);
  const completedMonth = completedAll.filter(r => r.date && r.date.startsWith(monthStr));

  const sourceRuns = analyticsTab === 'all' ? completedAll : completedMonth;
  const leaderboard = buildLeaderboard(sourceRuns);

  let lbHtml = '';
  if (leaderboard.length === 0) {
    lbHtml = `<div style="text-align:center; color:var(--text-secondary); padding:28px 0; font-size:14px;">완료된 러닝 기록이 없어요</div>`;
  } else {
    lbHtml = leaderboard.map((entry, i) => {
      const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span style="font-size:13px;font-weight:700;color:var(--text-secondary)">${i+1}</span>`;
      const labels = ['광인', '집요', '신예'];
      const legendBadge = i < 3 ? `<span class="badge-legend">${labels[i]}</span>` : '';
      return `
        <div class="lb-row">
          <div class="lb-rank">${rankIcon}</div>
          <div class="lb-name">${esc(entry.name)}${legendBadge}</div>
          <div>
            <div class="lb-dist">${entry.distance % 1 === 0 ? entry.distance : entry.distance.toFixed(1)}km</div>
            <div class="lb-count">${entry.count}회 참여</div>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('analytics-content').innerHTML = `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num">${completedAll.length}</div>
        <div class="stat-label">총 완료 런</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${completedMonth.length}</div>
        <div class="stat-label">이번 달 완료 런</div>
      </div>
    </div>
    <div class="detail-section-title">${analyticsTab === 'all' ? '전체 기간' : '이번 달'} 멤버 기록</div>
    <div class="leaderboard">${lbHtml}</div>`;
}

// ─── MODALS ──────────────────────────────────────────────────────
function openModal(overlayId) {
  document.getElementById(overlayId).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(overlayId) {
  document.getElementById(overlayId).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e, overlayId) {
  if (e.target.id === overlayId) closeModal(overlayId);
}

// ─── LIGHTBOX ────────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ─── HELPERS ─────────────────────────────────────────────────────
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function updateDescCount() {
  const ta = document.getElementById('f-description');
  const el = document.getElementById('desc-count');
  if (ta && el) el.textContent = `${ta.value.length}/60`;
}
